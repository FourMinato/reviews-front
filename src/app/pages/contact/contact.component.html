<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
        <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=Prompt:wght@300;400;500;700&family=Mitr:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อผู้ดูแลระบบ</title>
    <style>
        /* ตั้งค่าพื้นฐานสำหรับหน้าเว็บ */
        body {
             font-family: 'Kanit', 'Prompt', 'Mitr', 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* การออกแบบกล่องการ์ด (Card) */
        .contact-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* ไอคอนซองจดหมาย */
        .icon svg {
            width: 64px;
            height: 64px;
            color: black; /* สีฟ้า */
            margin-bottom: 20px;
        }

        /* หัวข้อและข้อความ */
        h2 {
            color: #1f2937;
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        p {
            color: #4b5563;
            margin: 0 0 30px 0;
            line-height: 1.6;
            font-size: 16px;
        }

        /* ปุ่มลิงก์ไปยังอีเมล */
        .email-button {
            background-color: black;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(48, 48, 48, 0.3);
        }

        .email-button:hover {
            background-color: rgb(35, 35, 35);
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        </div>
        
        <h2>ติดต่อผู้ดูแลระบบ</h2>
        <p>หากคุณพบปัญหาในการใช้งาน มีข้อสงสัย หรือต้องการเสนอแนะ สามารถส่งอีเมลหาทีมงานของเราได้โดยตรง</p>
        
<a href="https://mail.google.com/mail/?view=cm&fs=1&to=nightnicec@gmail.com&su=ติดต่อสอบถาม/แจ้งปัญหาการใช้งาน" target="_blank" class="email-button">
            เขียนอีเมลหาเรา
        </a>
  
    </div>

</body>
</html>
