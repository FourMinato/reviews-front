<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <title>Edit Subject</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* พื้นหลังสีเทาอ่อน คุมโทนเดียวกับหน้าอื่น */
            background-color: #F3F4F6; 
        }

        .page-wrapper {
            width: 85%;
            max-width: 1096px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        header {
            width: 100%;
            height: 5rem;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #E5E7EB; 
            margin-bottom: 2rem;
        }

        nav {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ปุ่มกลับ สไตล์ขาวขอบเทา */
        .back-btn {
            background-color: #ffffff;
            color: #374151;
            border: 1px solid #D1D5DB;
            padding: 8px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            flex-shrink: 0; 
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .back-btn:hover {
            background-color: #F9FAFB;
            color: #111827;
            border-color: #9CA3AF;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            color: #374151;
        }

        main {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        /* Card สไตล์คลีน มุมมน มีเงาเบาๆ */
        .card {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: none;
        }

        .create-title {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
            color: #4B5563;
            margin-left: 4px;
        }

        input, select {
            width: 100%;
            height: 50px;
            padding: 0 1rem;
            font-size: 1rem;
            color: #1F2937;
            border: 1px solid #D1D5DB;
            border-radius: 10px;
            outline: none;
            background-color: #ffffff;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #9CA3AF;
        }

        /* Focus สีน้ำเงิน (ธีมแก้ไข) */
        input:focus, select:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* จัดกลุ่มปุ่มด้านล่าง */
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 15px; /* ระยะห่างระหว่างปุ่ม */
            width: 100%;
            margin-top: 1rem;
        }

        /* ปุ่มลบ (สีแดง) */
        .delete-btn {
            flex: 1; /* แบ่งพื้นที่เท่ากัน */
            background-color: #EF4444; /* แดง Danger */
            color: white;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
        }

        .delete-btn:hover {
            background-color: #DC2626;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(239, 68, 68, 0.3);
        }

        /* ปุ่มบันทึกแก้ไข (สีน้ำเงิน) */
        .create-btn {
            flex: 1; /* แบ่งพื้นที่เท่ากัน */
            background-color: #3B82F6; /* น้ำเงิน Primary */
            color: white;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .create-btn:hover {
            background-color: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.3);
        }

        .delete-btn:active, .create-btn:active {
            transform: translateY(0);
        }

        /* Responsive มือถือ */
        @media (max-width: 600px) {
            .page-wrapper {
                width: 100%;
                padding: 0 20px; 
            }

            header {
                height: 4.5rem;
                margin-bottom: 1rem;
            }

            .card {
                padding: 2rem 1.5rem;
                box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); 
            }

            .logo {
                font-size: 1rem;
            }
            
            .create-title {
                font-size: 1.4rem;
            }

            /* ในจอมือถือเล็กมากๆ อาจจะปรับปุ่มให้เรียงบนล่างได้ แต่ถ้าเอาตามนี้ยังโอเคอยู่ครับ */
            .button-group {
                gap: 10px;
            }
            .delete-btn, .create-btn {
                font-size: 1rem;
                padding: 0.7rem 0.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header>
            <nav>
                <button class="back-btn" (click)="back()">กลับ</button>
                <div class="logo">
                    <span>Edit Subject</span>
                </div>
            </nav>
        </header>

        <main>
            <div class="card">
                <div class="create-title">แก้ไขรายวิชา</div>

                <div class="input-group">
                    <label>หมวดหมู่รายวิชา</label>
                    <select [(ngModel)]="subjectData.category">
                        <option value="0" disabled>กรุณาเลือกหมวดหมู่</option>
                        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>รหัสวิชา</label>
                    <input type="text" [(ngModel)]="subjectData.subcode" placeholder="เช่น 0041001">
                </div>

                <div class="input-group">
                    <label>ชื่อรายวิชา</label>
                    <input type="text" [(ngModel)]="subjectData.name" placeholder="ระบุชื่อวิชา">
                </div>

                <div class="input-group">
                    <label>การเปิดการมองเห็น (1 คือกำลังเปิดการมองเห็น)</label>
                    <select [(ngModel)]="subjectData.open">
                        <option value="0" disabled>การเปิดการมองเห็น</option>
                        <option *ngFor="let vis of visibility" [value]="vis">{{ vis }}</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="delete-btn" (click)="deleteSubject(subjectData.subid)">ลบวิชา</button>
                    <button class="create-btn" (click)="onSave()">แก้ไขวิชา</button>
                </div>

            </div>
        </main>
    </div>
</body>

</html>
